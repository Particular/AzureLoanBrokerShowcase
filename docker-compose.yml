name: loanbroker
services:
  sqlserver:
    profiles: ['', infrastructure]
    image: mcr.microsoft.com/mssql/server:2025-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: YourStrong@Passw0rd
      MSSQL_PID: Developer
      MSSQL_COLLATION: SQL_Latin1_General_CP1_CI_AS
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./src/sqlserver/init-db.sh:/var/opt/mssql/init-db.sh
    command: bash -c "/var/opt/mssql/init-db.sh"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "IF DB_ID('NServiceBus') IS NOT NULL AND DATABASEPROPERTYEX('NServiceBus','Status') = 'ONLINE' SELECT 1 ELSE THROW 50000, 'Healthcheck failed', 1"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ls
  creditbureau:
    profiles: ['', infrastructure]
    build:
      context: ./
      dockerfile: ./src/CreditBureau/Dockerfile
    ports:
      - "7071:80"
    networks:
      - ls
  loan-broker:
    profiles: ['']
    image: loanbroker-azure/loan-broker:latest
    env_file:
      - env/metrics.env
      - env/azure.env
    environment:
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
    depends_on:
      creditbureau:
        condition: service_started
      servicepulse:
        condition: service_started
    networks:
      - ls
  bank1:
    profiles: ['']
    image: loanbroker-azure/bank1:latest
    env_file:
      - env/metrics.env
      - env/azure.env
    environment:
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
    depends_on:
      servicepulse:
        condition: service_started
    networks:
      - ls
  bank2:
    profiles: ['']
    image: loanbroker-azure/bank2:latest
    env_file:
      - env/metrics.env
      - env/azure.env
    environment:
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
    depends_on:
      servicepulse:
        condition: service_started
    networks:
      - ls
  bank3:
    profiles: ['']
    image: loanbroker-azure/bank3:latest
    env_file:
      - env/metrics.env
      - env/azure.env
    environment:
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
    depends_on:
      servicepulse:
        condition: service_started
    networks:
      - ls
  email-sender:
    profiles: ['']
    image: loanbroker-azure/email-sender:latest
    env_file:
      - env/metrics.env
      - env/azure.env
    environment:
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
    depends_on:
      servicepulse:
        condition: service_started
    networks:
      - ls
  client:
    profiles: ['']
    image: loanbroker-azure/client:latest
    env_file:
      - env/metrics.env
      - env/azure.env
    environment:
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
    depends_on:
      servicepulse:
        condition: service_started
      loan-broker:
        condition: service_started
    networks:
      - ls
    tty: true
    stdin_open: true
    command: --demo
  otel-collector:
    profiles: [ '', infrastructure ]
    image: otel/opentelemetry-collector-contrib:0.102.1
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    volumes:
      - ./src/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "5318:5318"
      - "1234:1234"
    networks:
      - ls
  prometheus:
    profiles: ['', infrastructure]
    image: docker.io/prom/prometheus:v2.53.2
    ports:
      - '9090:9090'
    volumes:
      - ./src/prometheus/:/etc/prometheus/
      - prometheus-data:/prometheus
    command: --web.enable-lifecycle --config.file=/etc/prometheus/prometheus.yml
    networks:
      - ls
  grafana:
    profiles: ['', infrastructure]
    image: docker.io/grafana/grafana-oss:latest
    ports:
      - '3000:3000'
    restart: unless-stopped
    volumes:
      - ./src/grafana/provisioning/:/etc/grafana/provisioning/
      - ./src/grafana/dashboards/:/var/lib/grafana/dashboards/
      - grafana-data:/var/lib/grafana
    networks:
      - ls
  jaeger:
    profiles: ['', infrastructure]
    image: docker.io/jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - 16686:16686
    volumes:
      - jaeger-data:/tmp
    networks:
      - ls
  servicecontrol:
    profiles: ['', infrastructure]
    image: docker.io/particular/servicecontrol:latest
    env_file:
      - env/service-platform.env
    ports:
      - "33333:33333"
    environment:
      RAVENDB_CONNECTIONSTRING: http://servicecontrol-db:8080
      REMOTEINSTANCES: '[{"api_uri":"http://servicecontrol-audit:44444/api"}]'
      SERVICECONTROL_CONNECTIONSTRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
      SERVICECONTROL_ALLOWMESSAGEEDITING: 'true'
    command: --setup-and-run
    restart: unless-stopped
    depends_on:
      servicecontrol-db:
        condition: service_healthy
    networks:
      - ls
  servicecontrol-db:
    profiles: ['', infrastructure]
    image: docker.io/particular/servicecontrol-ravendb:latest
    ports:
      - "8080:8080"
    environment:
      - RAVEN_ARGS=--Setup.Mode=None
      - RAVEN_Security_UnsecuredAccessAllowed=PublicNetwork
    volumes:
      - servicecontrol-db:/var/lib/ravendb/data
      - servicecontrol-db-config:/var/lib/ravendb/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/studio/index.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ls
  servicecontrol-audit:
    profiles: ['', infrastructure]
    image: docker.io/particular/servicecontrol-audit:latest
    env_file:
      - env/service-platform.env
    ports:
      - "44444:44444"
    environment:
      RAVENDB_CONNECTIONSTRING: http://servicecontrol-db:8080
      SERVICECONTROL_AUDIT_CONNECTIONSTRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
      SERVICECONTROL_AUDIT_SERVICECONTROLQUEUEADDRESS: Particular.ServiceControl
    command: --setup-and-run
    restart: unless-stopped
    depends_on:
      servicecontrol-db:
        condition: service_healthy
    networks:
      - ls
  servicecontrol-monitoring:
    profiles: ['', infrastructure]
    image: docker.io/particular/servicecontrol-monitoring:latest
    env_file:
      - env/service-platform.env
    restart: unless-stopped
    command: --setup-and-run
    ports:
      - "33633:33633"
    environment:
      MONITORING_CONNECTIONSTRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:?AZURE_SERVICE_BUS_CONNECTION_STRING must be set in .env}
    depends_on:
      servicecontrol-db:
        condition: service_healthy
    networks:
      - ls
  servicepulse:
    profiles: ['', infrastructure]
    image: docker.io/particular/servicepulse:latest
    ports:
      - "9999:9090"
    environment:
      SERVICECONTROL_URL: http://servicecontrol:33333
      MONITORING_URL: http://servicecontrol-monitoring:33633
    restart: unless-stopped
    depends_on:
      servicecontrol:
        condition: service_healthy
      servicecontrol-monitoring:
        condition: service_healthy
    networks:
      - ls
networks:
  ls:
    ipam:
      config:
        - subnet: 10.0.2.0/24
volumes:
  grafana-data:
  prometheus-data:
  jaeger-data:
  servicecontrol-db:
  servicecontrol-db-config:
  sqlserver-data:
